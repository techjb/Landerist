<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="description" content="Landerist Hosts Statistics" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@techjb" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.8/css/dataTables.dataTables.min.css" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Hosts Statistics</title>
</head>

<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">Landerist</a>
            <ul class="nav-links">
                <!--<li><a href="/downloads">Downloads</a></li>-->
                <li><a href="/statistics">Statistics</a></li>
                <!--<li><a href="/hosts-statistics">Hosts Statistics</a></li>-->
                <li><a href="https://github.com/techjb/Landerist">GitHub</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-container page-container-wide">
        <div class="page-header">
            <h1>Hosts Statistics</h1>
            <p>Updated: /*UPDATED_AT*/</p>
        </div>

        <div class="section">
            <div class="table-wrapper">
                <table id="HostsStatisticsTable" class="display hosts-statistics-table">
                    <thead>
                        <tr>
                            <th>Host</th>
                            <th>RobotsTxt</th>
                            <th>Sitemap</th>
                            <th>Pages</th>
                            <th>Scraped (3 Days)</th>
                            <th>Inserted (3 Days)</th>
                            <th>Listings</th>
                            <th>New (7 days)</th>
                            <th>Published</th>
                            <th>Unpublished</th>
                        </tr>
                    </thead>
                    <tbody>
/*HOSTS_STATISTICS_ROWS*/
                    </tbody>
                </table>
            </div>
        </div>

        <div class="footer">
            <p>&copy; Landerist</p>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.8/js/dataTables.min.js"></script>
    <script>
        new DataTable('#HostsStatisticsTable', {
            order: [[0, 'asc']],
            pageLength: 50,
            lengthMenu: [[25, 50, 100, -1], [25, 50, 100, 'All']],
            language: {
                search: 'Filter:'
            },
            columnDefs: [
                { targets: [3, 4, 5, 6, 7, 8, 9], className: 'dt-body-right dt-head-right' }
            ]
        });
    </script>
</body>
</html>
